services:
  app:
    build: .
    container_name: fahrmanager-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      TZ: ${TZ}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  serviceterminpro-app:
    image: hashicorp/http-echo:1.0.0
    container_name: serviceterminpro-app
    restart: unless-stopped
    command: ["-listen=:8010", "-text=ServiceTerminPro placeholder - replace with real app"]
    depends_on:
      serviceterminpro-postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    expose:
      - "8010"

  postgres:
    image: postgres:16-alpine
    container_name: fahrmanager-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  serviceterminpro-postgres:
    image: postgres:16-alpine
    container_name: serviceterminpro-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${SERVICEPRO_POSTGRES_USER:-serviceterminpro}
      POSTGRES_PASSWORD: ${SERVICEPRO_POSTGRES_PASSWORD:-change-me-servicepro}
      POSTGRES_DB: ${SERVICEPRO_POSTGRES_DB:-serviceterminpro}
      TZ: ${TZ}
    volumes:
      - serviceterminpro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SERVICEPRO_POSTGRES_USER:-serviceterminpro} -d ${SERVICEPRO_POSTGRES_DB:-serviceterminpro}"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: fahrmanager-nginx
    restart: unless-stopped
    depends_on:
      - app
      - serviceterminpro-app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  serviceterminpro_postgres_data:
