{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="login-brand-wrap text-center mb-3">
            <img src="/static/logo_fahrmanager360.png" alt="FahrManager 360" class="login-logo">
        </div>
        <h1 class="h4 mb-3">Login</h1>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login" class="card card-body">
            <div class="mb-3">
                <label class="form-label">E-Mail</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Passwort</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button class="btn btn-primary" type="submit">Einloggen</button>
        </form>
    </div>
</div>
{% endblock %}
