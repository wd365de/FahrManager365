{% extends "base.html" %}
{% block content %}
<h1 class="h4 mb-3">Fahrlehrer</h1>
<form method="post" action="/teachers/new" class="card card-body mb-4">
    <div class="row g-3 align-items-end">
        <div class="col-md-4">
            <label class="form-label">Name</label>
            <input class="form-control" name="name" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">E-Mail</label>
            <input class="form-control" type="email" name="email" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Passwort</label>
            <input class="form-control" type="password" name="password" required>
        </div>
        <div class="col-md-1">
            <button class="btn btn-primary w-100" type="submit">+</button>
        </div>
    </div>
</form>
<table class="table table-striped table-bordered">
    <thead><tr><th>Name</th><th>E-Mail</th></tr></thead>
    <tbody>
    {% for teacher in teachers %}
        <tr><td>{{ teacher.user.name }}</td><td>{{ teacher.user.email }}</td></tr>
    {% else %}
        <tr><td colspan="2">Keine Fahrlehrer vorhanden.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
